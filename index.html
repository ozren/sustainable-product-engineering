<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Agile &amp; Lean Concepts</title>
<style>
 * {margin:0;padding:0;box-sizing:border-box;}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);color:#1a1a1a;padding:2rem 1rem;min-height:100vh;}
 .container{max-width:1500px;margin:0 auto;}
 header{text-align:center;margin-bottom:2.5rem;}
 h1{font-size:2.25rem;font-weight:300;letter-spacing:1.5px;margin-bottom:.5rem;color:#0a0a0a;}
 .subtitle{font-size:.95rem;color:#666;font-weight:300;}
 .controls{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
 .search-box{flex:1;min-width:250px;padding:.7rem 1rem;border:1px solid #ccc;border-radius:4px;font-size:.95rem;background:white;}
 .search-box:focus{outline:none;border-color:#2c3e50;box-shadow:0 0 0 3px rgba(44,62,80,.1);}
 .filter-buttons{display:flex;gap:.4rem;flex-wrap:wrap;}
 .filter-btn{padding:.5rem 1rem;border:1px solid #ccc;background:white;border-radius:4px;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .15s;white-space:nowrap;color:#333;}
 .filter-btn:hover{border-color:#999;background:#fafafa;}
 .filter-btn.active{background:#2c3e50;color:white;border-color:#2c3e50;}
 .legend{display:flex;gap:1.25rem;margin-bottom:2rem;flex-wrap:wrap;padding:1.25rem;background:white;border-radius:6px;border:1px solid #e0e0e0;}
 .legend-item{display:flex;align-items:center;gap:.5rem;font-size:.85rem;}
 .legend-color{width:22px;height:22px;border-radius:4px;border:1.5px solid;}
 .table-wrapper{background:white;padding:1.5rem;border-radius:8px;border:1px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto;}
 .periodic-table{display:grid;grid-template-columns:repeat(18,minmax(68px,1fr));gap:4px;min-width:1300px;}
 .element{aspect-ratio:1;border:1.5px solid;border-radius:4px;display:flex;flex-direction:column;justify-content:space-between;text-align:center;padding:4px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,opacity .2s ease;font-size:.7rem;line-height:1.15;position:relative;overflow:hidden;}
 .element:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:10;}
 .element.dim{opacity:.15;pointer-events:none;}
 .element-number{font-size:.6rem;opacity:.7;font-weight:500;text-align:left;padding-left:2px;}
 .element-symbol{font-size:1.35rem;font-weight:600;line-height:1;}
 .element-name{font-size:.6rem;font-weight:500;opacity:.9;word-break:break-word;hyphens:auto;}
 .element.empty{border:none;background:transparent!important;cursor:default;pointer-events:none;}
 .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem;}
 .modal.active{display:flex;}
 .modal-content{background:white;border-radius:8px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:2rem;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.2);animation:slideUp .25s ease;}
 @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
 .modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;border-radius:4px;transition:background .15s,color .15s;}
 .modal-close:hover{background:#f0f0f0;color:#000;}
 .modal-header{display:flex;gap:1.25rem;align-items:center;margin-bottom:1.25rem;padding-right:2.5rem;}
 .modal-symbol-box{width:80px;height:80px;border-radius:6px;border:2px solid;display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:600;flex-shrink:0;}
 .modal-symbol-box .modal-num{font-size:.7rem;opacity:.7;align-self:flex-start;padding-left:6px;margin-bottom:-4px;}
 .modal-symbol-box .modal-sym{font-size:2rem;line-height:1;}
 .modal-title h2{font-size:1.6rem;margin-bottom:.4rem;font-weight:500;color:#0a0a0a;}
 .category-badge{display:inline-block;padding:.25rem .75rem;border-radius:12px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:1px solid;}
 .modal-body{line-height:1.7;color:#333;font-size:.95rem;padding-top:1rem;border-top:1px solid #eee;}
 .modal-refs{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid #eee;}
 .modal-refs h3{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-bottom:.75rem;}
 .modal-refs ul{list-style:none;display:flex;flex-direction:column;gap:.5rem;}
 .modal-refs li{font-size:.9rem;line-height:1.5;}
 .modal-refs a{color:#2c3e50;text-decoration:none;border-bottom:1px solid #cbd2d8;transition:border-color .15s,color .15s;}
 .modal-refs a:hover{color:#1a252f;border-bottom-color:#2c3e50;}
 .ref-type{display:inline-block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-right:.4rem;padding:1px 6px;background:#f0f0f0;border-radius:3px;}
 .footer{text-align:center;margin-top:2.5rem;padding:1.5rem;color:#888;font-size:.85rem;}
 @media(max-width:768px){h1{font-size:1.6rem;}.periodic-table{min-width:1100px;}.controls{flex-direction:column;align-items:stretch;}.search-box{min-width:100%;}}
 @media print{body{background:white;padding:.5rem;}.controls,.footer{display:none;}.table-wrapper{box-shadow:none;border:none;padding:0;}.modal{display:none!important;}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Periodic Table of Agile &amp; Lean</h1>
<p class="subtitle">100 essential concepts organized by category and function</p>
</header>
<div class="controls">
<input type="text" id="search" class="search-box" placeholder="Search by term, symbol, or definition...">
<div class="filter-buttons">
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="agile">Agile</button>
<button class="filter-btn" data-filter="scrum">Scrum</button>
<button class="filter-btn" data-filter="kanban">Kanban</button>
<button class="filter-btn" data-filter="lean">Lean</button>
<button class="filter-btn" data-filter="xp">XP</button>
<button class="filter-btn" data-filter="scaling">Scaling</button>
<button class="filter-btn" data-filter="metrics">Metrics</button>
</div>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-color" style="background:#EEEDFE;border-color:#7F77DD;"></div><span>Agile core</span></div>
<div class="legend-item"><div class="legend-color" style="background:#E1F5EE;border-color:#1D9E75;"></div><span>Scrum</span></div>
<div class="legend-item"><div class="legend-color" style="background:#E6F1FB;border-color:#378ADD;"></div><span>Kanban</span></div>
<div class="legend-item"><div class="legend-color" style="background:#FAECE7;border-color:#D85A30;"></div><span>Lean</span></div>
<div class="legend-item"><div class="legend-color" style="background:#FBEAF0;border-color:#D4537E;"></div><span>XP / Engineering</span></div>
<div class="legend-item"><div class="legend-color" style="background:#FAEEDA;border-color:#BA7517;"></div><span>Scaling</span></div>
<div class="legend-item"><div class="legend-color" style="background:#F1EFE8;border-color:#888780;"></div><span>Metrics / Flow</span></div>
</div>
<div class="table-wrapper"><div class="periodic-table" id="table"></div></div>
<div class="footer"><p>Click any element for definition and curated references &middot; 100 Agile &amp; Lean concepts</p></div>
</div>
<div class="modal" id="modal" role="dialog" aria-modal="true">
<div class="modal-content">
<button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
<div id="modal-body"></div>
</div>
</div>

</body>
</html>
